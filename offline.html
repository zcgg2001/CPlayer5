<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#dceeff">
  <title>CPlayer 5 - 离线</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #dceeff;
      color: #172033;
    }
    body {
      min-height: 100dvh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      background:
        radial-gradient(circle at 18% 20%, rgba(111, 201, 255, 0.72), transparent 38%),
        radial-gradient(circle at 84% 16%, rgba(180, 159, 255, 0.62), transparent 42%),
        linear-gradient(135deg, #d5edff, #ece7ff 58%, #d9f3ff);
    }
    main {
      max-width: 420px;
      text-align: center;
      padding: 36px;
      border-radius: 32px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.76), rgba(255, 255, 255, 0.38));
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 24px 60px rgba(55, 65, 128, 0.17), inset 0 1px 0 rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
    }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      color: #fff;
      background: linear-gradient(135deg, #287bb8, #5148bd 72%, #6d55b8);
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-radius: 18px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 12px 28px rgba(91, 91, 214, 0.28);
      transition: transform 220ms cubic-bezier(0.23, 1, 0.32, 1), box-shadow 220ms cubic-bezier(0.23, 1, 0.32, 1);
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(91, 91, 214, 0.34);
    }
    a:focus-visible {
      outline: 3px solid rgba(91, 91, 214, 0.4);
      outline-offset: 3px;
    }
    @media (max-width: 520px) {
      main {
        padding: 28px 20px;
        backdrop-filter: blur(16px) saturate(145%);
        -webkit-backdrop-filter: blur(16px) saturate(145%);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      * {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>当前处于离线状态</h1>
    <p>已缓存的播放器界面仍可打开，但搜索、歌单更新和音乐播放需要网络连接。</p>
    <a href="./index.html">重新打开播放器</a>
  </main>
</body>
</html>
